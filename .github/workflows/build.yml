name: Build IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: Build archive
      run: |
        xcodebuild archive \
          -project plumbum.xcodeproj \
          -scheme plumbum \
          -configuration Release \
          -archivePath build/plumbum.xcarchive \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO || {
          echo "Build failed!"
          echo "Reason: xcodebuild archive command failed"
          echo "Possible causes:"
          echo "  - Xcode project file is corrupted"
          echo "  - Scheme 'plumbum' does not exist"
          echo "  - Missing source files or dependencies"
          echo "  - Build settings are invalid"
          echo "Solution: Check xcode project structure"
          exit 1
        }
          
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/plumbum.xcarchive \
          -exportPath build \
          -exportOptionsPlist exportOptions.plist \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO || {
          echo "Export failed!"
          echo "Reason: xcodebuild exportArchive command failed"
          echo "Possible causes:"
          echo "  - Archive file is corrupted or incomplete"
          echo "  - exportOptions.plist is missing or invalid"
          echo "  - Export method is not supported"
          echo "Solution: Check exportOptions.plist and archive integrity"
          exit 1
        }
          
    - name: Create IPA manually if needed
      run: |
        if [ -f "build/plumbum.app/plumbum" ]; then
          cd build
          zip -r plumbum.ipa plumbum.app || {
            echo "Manual IPA creation failed!"
            echo "Reason: zip command failed"
            echo "Possible causes:"
            echo "  - .app bundle is incomplete or corrupted"
            echo "  - Insufficient disk space"
            echo "Solution: Check .app bundle contents and disk space"
            cd ..
            exit 1
          }
          cd ..
        fi
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: plumbum-ipa
        path: build/plumbum.ipa
        retention-days: 30
        
    - name: Upload archive artifact
      uses: actions/upload-artifact@v4
      with:
        name: plumbum-xcarchive
        path: build/plumbum.xcarchive
        retention-days: 7
