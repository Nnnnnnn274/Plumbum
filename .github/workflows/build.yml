name: Build IPA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: Build XPF subproject
      run: |
        cd plumbum/XPF
        make all
        
    - name: Build archive
      run: |
        xcodebuild archive \
          -project plumbum.xcodeproj \
          -scheme plumbum \
          -configuration Release \
          -archivePath build/plumbum.xcarchive \
          -derivedDataPath build/DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/plumbum.xcarchive \
          -exportPath build \
          -exportOptionsPlist exportOptions.plist \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Create IPA manually if needed
      run: |
        if [ -f "build/plumbum.app/plumbum" ]; then
          cd build
          zip -r plumbum.ipa plumbum.app
          cd ..
        fi
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: plumbum-ipa
        path: build/plumbum.ipa
        retention-days: 30
        
    - name: Upload archive artifact
      uses: actions/upload-artifact@v4
      with:
        name: plumbum-xcarchive
        path: build/plumbum.xcarchive
        retention-days: 7
